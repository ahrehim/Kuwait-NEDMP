<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EPA NEDMP Verification App v21</title>
  <style>
    :root {
      --unep-blue: #0077b6;
      --unep-deep: #004b73;
      --unep-green: #2e7d32;
      --ink: #1f2d3d;
      --muted: #5f6d7e;
      --line: #d9e2ec;
      --soft: #f4f8fb;
      --warning: #fff6dc;
      --danger: #9b1c1c;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: #eef4f7;
      color: var(--ink);
      line-height: 1.5;
      font-size: 14px;
    }
    header {
      background: linear-gradient(135deg, var(--unep-deep), var(--unep-blue));
      color: #fff;
      padding: 20px clamp(16px, 4vw, 38px);
      border-bottom: 4px solid var(--unep-green);
    }
    h1 { margin: 0; font-size: clamp(20px, 2.35vw, 28px); line-height: 1.22; max-width: 1200px; font-weight: 700; }
    .subtitle { margin-top: 7px; opacity: .92; font-weight: 500; font-size: 14px; }
    .banner-tools {
      max-width: 1380px;
      margin: 10px auto 0;
      padding: 0 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .banner-intro { color: #334155; font-size: 13.5px; max-width: 980px; }
    main { max-width: 1380px; margin: 0 auto; padding: 16px; }
    .topbar, .selectors, .stats, .coverage-grid {
      display: grid;
      gap: 12px;
    }
    .topbar { grid-template-columns: minmax(220px, 1fr) minmax(220px, 1fr) auto; align-items: end; }
    .selectors { grid-template-columns: minmax(220px, 1fr) minmax(280px, 2fr); }
    .stats { grid-template-columns: repeat(3, minmax(130px, 1fr)); margin: 14px 0; }
    .coverage-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); margin: 14px 0; }
    .question-coverage { grid-column: 2; }
    .submit-coverage { grid-column: 1; align-items: flex-start; }
    .panel, .department-filter, .question-card, .coverage, .stat {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 6px 18px rgba(24, 66, 96, .06);
    }
    .panel, .department-filter, .question-card { padding: 14px; margin-bottom: 12px; }
    .stat { padding: 11px; min-height: 68px; }
    .stat strong { display: block; color: var(--unep-deep); font-size: 20px; font-weight: 700; }
    .stat span, .meta-row, .filter-help, .coverage-detail { color: var(--muted); font-size: 12.5px; }
    label { display: block; font-weight: 650; color: var(--muted); margin-bottom: 5px; font-size: 13px; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #bcc8d6;
      border-radius: 6px;
      padding: 8px 10px;
      font: inherit;
      background: #fff;
    }
    select[multiple] { min-height: 120px; }
    textarea { min-height: 90px; resize: vertical; }
    button {
      border: 1px solid var(--unep-blue);
      background: var(--unep-blue);
      color: #fff;
      border-radius: 7px;
      padding: 8px 12px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary { background: #fff; color: var(--unep-deep); border-color: #9ac3e6; }
    button.success { background: var(--unep-green); border-color: var(--unep-green); }
    button.danger { background: var(--danger); border-color: var(--danger); }
    .agreement-filter-panel { display: grid; gap: 8px; }
    .agreement-filter-title { color: var(--unep-deep); font-weight: 750; font-size: 14px; }
    .agreement-checks { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .agreement-check {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin: 0;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--unep-deep);
      font-weight: 700;
    }
    .agreement-check input { width: auto; margin: 0; }
    .department-tools, .action-row, .modal-actions, .submit-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .actions { border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 12px 0; margin-bottom: 12px; }
    .secondary-row { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line); }
    .hint { color: var(--muted); font-size: 13px; margin-inline-start: auto; }
    .note {
      background: var(--warning);
      border: 1px solid #f1c75b;
      border-radius: 7px;
      padding: 10px 12px;
      color: #475569;
    }
    .question-title { font-weight: 700; color: var(--unep-deep); font-size: 16px; margin-bottom: 8px; }
    .content-grid { display: grid; gap: 12px; }
    .table-wrap { overflow-x: auto; background: #fff; border: 1px solid var(--line); border-radius: var(--radius); }
    table { width: 100%; border-collapse: collapse; min-width: 760px; font-size: 13.5px; }
    th, td { border-bottom: 1px solid var(--line); padding: 8px 9px; text-align: start; vertical-align: top; }
    th { background: #edf6fb; color: var(--unep-deep); font-weight: 700; }
    tr:last-child td { border-bottom: 0; }
    .coverage { display: flex; gap: 14px; align-items: center; padding: 14px; }
    .pie {
      width: 94px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: conic-gradient(var(--unep-green) 0deg, var(--line) 0deg 360deg);
      display: grid;
      place-items: center;
      position: relative;
      flex: none;
    }
    .pie::after { content: ""; width: 66px; aspect-ratio: 1; border-radius: 50%; background: #fff; position: absolute; }
    .pie strong { position: relative; z-index: 1; color: var(--unep-deep); font-size: 17px; font-weight: 700; }
    .coverage-title { font-weight: 700; color: var(--unep-deep); margin-bottom: 4px; }
    .submit-copy { color: var(--ink); font-size: 13.5px; margin-bottom: 10px; }
    .verified-option { color: #b91c1c; font-weight: 700; }
    .agreement-level { font-weight: 750; }
    .login-backdrop, .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(5, 20, 31, .72);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .modal-backdrop { display: none; z-index: 60; }
    .login-card, .modal {
      width: min(640px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: #fff;
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 20px 70px rgba(0,0,0,.24);
    }
    .login-card {
      width: min(520px, 100%);
      padding: 26px 30px 28px;
      border-top: 5px solid var(--unep-green);
    }
    .login-card h2, .modal h2 { margin: 0 0 8px; color: var(--unep-deep); font-size: 20px; font-weight: 700; }
    .login-card h2 { font-size: 24px; letter-spacing: 0; }
    .login-card p { margin: 0 0 18px; color: var(--muted); font-size: 15px; }
    .login-card label { margin-top: 8px; }
    .login-card input {
      min-height: 46px;
      border-color: #b7c6d8;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, .04);
    }
    .login-actions { margin-top: 18px; justify-content: flex-start; }
    .login-actions button { min-width: 132px; min-height: 44px; }
    .banner-action-buttons { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .modal-help { margin: 0 0 12px; color: var(--muted); font-size: 14px; }
    .radio-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin: 12px 0; }
    .radio-card { border: 1px solid var(--line); border-radius: 7px; padding: 10px; color: var(--ink); cursor: pointer; }
    .radio-card input { width: auto; margin-inline-end: 8px; }
    .pill { display: inline-block; border: 1px solid var(--line); border-radius: 999px; padding: 5px 9px; background: var(--soft); font-weight: 650; }
    .choice-list { display: grid; gap: 7px; margin: 8px 0 4px; }
    .choice-option { display: flex; align-items: flex-start; gap: 8px; border: 1px solid var(--line); border-radius: 7px; padding: 8px 9px; color: var(--ink); font-weight: 500; background: #fff; }
    .choice-option input { width: auto; margin-top: 3px; flex: none; }
    .help-modal { width: min(1040px, 100%); }
    .help-content { color: var(--ink); font-size: 14px; }
    .help-content h2 { margin: 0 0 6px; color: var(--unep-deep); font-size: 22px; line-height: 1.25; }
    .help-content h3 { margin: 18px 0 8px; color: var(--unep-deep); font-size: 17px; }
    .help-subtitle { color: var(--muted); font-weight: 650; margin-bottom: 12px; }
    .help-list { margin: 8px 0 14px 20px; padding: 0; }
    .help-list li { margin: 6px 0; }
    .help-callout { background: #edf6fb; border-inline-start: 4px solid var(--unep-blue); border-radius: 7px; padding: 12px 14px; margin: 12px 0; }
    .help-table-wrap { overflow-x: auto; margin: 10px 0 16px; border: 1px solid var(--line); border-radius: var(--radius); background: #fff; }
    .help-table { min-width: 680px; font-size: 13px; }
    .help-table th, .help-table td { padding: 8px 9px; }
    .help-table tr:first-child th { background: #dff0f7; color: var(--unep-deep); }
    [dir="rtl"] .help-list { margin: 8px 20px 14px 0; }
    .chart-card { padding: 14px; background: #fff; border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 6px 18px rgba(24, 66, 96, .06); }
    .chart-card h2 { margin: 0 0 12px; color: var(--unep-deep); font-size: 18px; font-weight: 700; }
    .chart-note { margin: 12px 0 0; color: #475569; font-size: 12.8px; line-height: 1.55; }
    .chart-layout { display: grid; grid-template-columns: 220px minmax(220px, 1fr); gap: 16px; align-items: center; }
    .pie-wrap { width: 190px; aspect-ratio: 1; margin: 0 auto; position: relative; }
    .response-pie { width: 100%; aspect-ratio: 1; border-radius: 50%; margin: 0 auto; border: 1px solid var(--line); }
    .pie-label {
      position: absolute;
      transform: translate(-50%, -50%);
      z-index: 2;
      min-width: 30px;
      text-align: center;
      color: #fff;
      font-size: 12px;
      line-height: 1;
      font-weight: 800;
      text-shadow: 0 1px 3px rgba(0,0,0,.85), 0 0 2px rgba(0,0,0,.9);
      pointer-events: none;
    }
    .pie-label-small { min-width: 24px; font-size: 10.5px; }
    .legend { display: grid; gap: 7px; font-size: 13px; }
    .legend-item { display: grid; grid-template-columns: 14px minmax(0, 1fr) auto; gap: 8px; align-items: center; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,.12); }
    .bar-list { display: grid; gap: 9px; }
    .bar-row { display: grid; grid-template-columns: minmax(170px, 1fr) minmax(180px, 2fr) auto; gap: 10px; align-items: center; font-size: 13px; }
    .bar-track { height: 12px; background: var(--line); border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--unep-blue); border-radius: inherit; }
    .toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--unep-deep);
      color: #fff;
      border-radius: 999px;
      padding: 10px 18px;
      display: none;
      z-index: 80;
    }
    [dir="rtl"] body, body[dir="rtl"] { text-align: right; }
    @media (max-width: 850px) {
      .topbar, .selectors, .stats, .coverage-grid { grid-template-columns: 1fr; }
      .question-coverage, .submit-coverage { grid-column: auto; }
      .hint { margin-inline-start: 0; }
      header { padding: 18px; }
      .banner-tools { padding: 0 12px; justify-content: flex-start; align-items: flex-start; flex-direction: column; }
      .banner-action-buttons { justify-content: flex-start; }
      h1 { font-size: 20px; }
      main { padding: 12px; }
      .radio-row { grid-template-columns: 1fr; }
      .chart-layout, .bar-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="login-backdrop" id="loginScreen">
    <form class="login-card" id="loginForm">
      <h2 data-i18n="loginTitle"></h2>
      <p data-i18n="loginInstruction"></p>
      <label for="passwordInput" data-i18n="password"></label>
      <input id="passwordInput" type="password" autocomplete="current-password">
      <div class="modal-actions login-actions">
        <button type="submit" data-i18n="unlock"></button>
        <button type="button" class="secondary" id="clearPasswordBtn" data-i18n="clearPassword"></button>
        <button type="button" class="secondary" id="exitSystemBtn" data-i18n="exitSystem"></button>
      </div>
      <div class="note" id="loginError" style="display:none" data-i18n="badPassword"></div>
    </form>
  </div>

  <header>
    <h1 data-i18n="title"></h1>
    <div class="subtitle" data-i18n="subtitle"></div>
  </header>

  <section class="banner-tools">
    <div class="banner-intro" data-i18n="introText"></div>
    <div class="banner-action-buttons">
      <button id="helpBtn" type="button" class="secondary" data-i18n="help"></button>
      <button id="demoBtn" type="button" class="secondary" data-i18n="demo"></button>
    </div>
  </section>

  <main>
    <section class="topbar">
      <div>
        <label for="verifierDepartment" data-i18n="verifierDepartment"></label>
        <select id="verifierDepartment"></select>
      </div>
      <div>
        <label for="verifierName" data-i18n="verifierName"></label>
        <input id="verifierName" autocomplete="name">
      </div>
      <button id="languageBtn" class="secondary" type="button"></button>
    </section>

    <section class="stats" id="stats"></section>

    <section class="coverage-grid">
      <div class="coverage">
        <div class="pie" id="verificationPie"><strong id="verificationPercent">0%</strong></div>
        <div>
          <div class="coverage-title" data-i18n="verificationCoverage"></div>
          <div class="coverage-detail" id="coverageDetail"></div>
        </div>
      </div>
      <div class="coverage">
        <div class="pie" id="sectionsPie"><strong id="sectionsPercent">0%</strong></div>
        <div>
          <div class="coverage-title" data-i18n="sectionVerificationPercentage"></div>
          <div class="coverage-detail" id="sectionsDetail"></div>
        </div>
      </div>
      <div class="coverage submit-coverage">
        <div>
          <div class="submit-copy" data-i18n="submitInstruction"></div>
          <div class="submit-actions">
            <button id="exportBtn" type="button" class="success" data-i18n="exportCsv"></button>
            <button id="submitVerificationBtn" type="button" class="success" data-i18n="submitYourVerification"></button>
            <button id="clearBtn" type="button" class="danger" data-i18n="clearLocal"></button>
          </div>
        </div>
      </div>
      <div class="coverage question-coverage">
        <div class="pie" id="questionsPie"><strong id="questionsPercent">0%</strong></div>
        <div>
          <div class="coverage-title" data-i18n="questionsVerifiedTitle"></div>
          <div class="coverage-detail" id="questionsDetail"></div>
        </div>
      </div>
    </section>

    <section class="department-filter">
      <label for="departmentFilter" data-i18n="departmentFilter"></label>
      <select id="departmentFilter" multiple></select>
      <div class="department-tools">
        <button id="selectAllDeptBtn" class="secondary" type="button" data-i18n="selectAllDepartments"></button>
        <button id="clearDeptBtn" class="secondary" type="button" data-i18n="clearDepartments"></button>
      </div>
      <p class="filter-help" data-i18n="filterHelp"></p>
    </section>

    <section class="panel selectors">
      <div>
        <label for="sectionSelect" data-i18n="section"></label>
        <select id="sectionSelect"></select>
      </div>
      <div>
        <label for="questionSelect" data-i18n="question"></label>
        <select id="questionSelect"></select>
      </div>
    </section>

    <section class="panel agreement-filter-panel">
      <div class="agreement-filter-title" data-i18n="checkAgreementLevel"></div>
      <div id="agreementLevelChecks" class="agreement-checks"></div>
      <div class="department-tools">
        <button id="clearAgreementLevelsBtn" class="secondary" type="button" data-i18n="clearAgreementLevels"></button>
      </div>
      <p class="filter-help" data-i18n="agreementFilterHelp"></p>
    </section>

    <section class="panel question-card">
      <div class="question-title" id="questionTitle"></div>
      <div class="meta-row" id="questionMeta"></div>
      <div class="note" id="storageNote" data-i18n="note"></div>
    </section>

    <section class="actions">
      <div class="action-row">
        <button id="reportBtn" type="button" data-i18n="report"></button>
        <button id="integratedBtn" type="button" data-i18n="integratedResult"></button>
        <button id="verifyBtn" type="button" class="success" data-i18n="verifyResult"></button>
        <span class="hint" data-i18n="createdFrom"></span>
      </div>
      <div class="action-row secondary-row">
        <button id="verificationBtn" type="button" class="secondary" data-i18n="departmentVerification"></button>
        <button id="verificationReportBtn" type="button" class="secondary" data-i18n="verificationReport"></button>
      </div>
    </section>

    <section class="content-grid" id="content"></section>
  </main>

  <div class="modal-backdrop" id="verifyModal" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 data-i18n="verifyResult"></h2>
      <p class="modal-help" data-i18n="verifyInstruction"></p>
      <div>
        <label data-i18n="currentQuestion"></label>
        <div id="modalQuestion" class="pill"></div>
      </div>
      <div class="radio-row">
        <label class="radio-card"><input type="radio" name="decision" value="Agree" checked> <span data-i18n="agree"></span></label>
        <label class="radio-card"><input type="radio" name="decision" value="Disagree"> <span data-i18n="disagree"></span></label>
      </div>
      <div id="preferredBlock" style="display:none">
        <label data-i18n="chooseIntegrated"></label>
        <div class="filter-help" id="preferredHelp"></div>
        <div id="preferredOptions" class="choice-list"></div>
      </div>
      <div class="modal-actions">
        <button type="button" class="secondary" id="cancelVerify" data-i18n="cancel"></button>
        <button type="button" id="saveVerify" data-i18n="save"></button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="explanationPromptModal" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 data-i18n="explanation"></h2>
      <p class="modal-help" data-i18n="explanationQuestion"></p>
      <div class="radio-row">
        <label class="radio-card"><input type="radio" name="explanationChoice" value="yes" checked> <span data-i18n="yes"></span></label>
        <label class="radio-card"><input type="radio" name="explanationChoice" value="no"> <span data-i18n="no"></span></label>
      </div>
      <div class="modal-actions">
        <button type="button" class="secondary" id="cancelExplanationPrompt" data-i18n="cancel"></button>
        <button type="button" id="submitExplanationChoice" data-i18n="submit"></button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="explanationTextModal" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 data-i18n="writeExplanation"></h2>
      <label for="explanationText" data-i18n="explanation"></label>
      <textarea id="explanationText"></textarea>
      <div class="modal-actions">
        <button type="button" class="secondary" id="cancelExplanationText" data-i18n="cancel"></button>
        <button type="button" id="submitExplanationText" data-i18n="submit"></button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="helpModal" role="dialog" aria-modal="true">
    <div class="modal help-modal">
      <h2 data-i18n="help"></h2>
      <div id="helpContent" class="help-content"></div>
      <div class="modal-actions">
        <button type="button" class="secondary" id="closeHelp" data-i18n="close"></button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="NEDMP-Verification-Config.js"></script>

    const HELP_HTML = {"en": "<div class=\"help-doc help-doc-en\"><h2 class=\"help-title\">EPA Departmental Verification Tool</h2><div class=\"help-subtitle\">User Help Guide for Reviewing Integrated NEDMP Questionnaire Results</div><div class=\"help-subtitle\">Evidence-based  |  Governance-driven  |  Verification-oriented</div><div class=\"help-callout\">Purpose of this help guide<br>This guide supports EPA departments in reviewing and verifying the integrated departmental questionnaire results prepared for the National Environmental Data Management Plan (NEDMP). It explains how to access the verification tool, review departmental and cross-departmental responses, confirm or qualify the integrated result, and submit a documented verification record to the NEDMP project team.</div><h3>Before you begin</h3><ul class=\"help-list\"><li>Ensure that you have received the department password and the verification tool link from the NEDMP project team.</li><li>Confirm that you are the designated departmental verifier, or that you have been authorized to submit comments on behalf of your department.</li><li>Review the integrated analysis carefully. The objective is to confirm, correct or qualify the results—not to repeat the full questionnaire exercise.</li><li>Where the department disagrees with an integrated result, provide the most accurate departmental position and, where possible, a short justification.</li></ul><h3>Step-by-step instructions</h3><div class=\"help-table-wrap\"><table class=\"help-table\"><tbody><tr><th>Step</th><th>Action</th><th>Guidance</th></tr><tr><td>1</td><td>Access the verification tool</td><td>Enter the Department Password to access the EPA/NEDMP verification interface.</td></tr><tr><td>2</td><td>Select your department</td><td>After you enter the system using your department password, your department will be selected automatically in the “Department Selection” drop-down menu.</td></tr><tr><td>3</td><td>Enter the verifier name</td><td>In the “Verifier Name” field, enter the name of the officer responsible for reviewing and confirming the departmental position.</td></tr><tr><td>4</td><td>Select the review scope</td><td>Use the “Departments Included in Report” menu to view either your department’s response or all departmental responses for the selected question.</td></tr><tr><td>5</td><td>Filter by agreement level</td><td>Use the “Filter by agreement level” checkboxes to filter the question list by one or more agreement levels and view the agreement-level distribution chart.</td></tr><tr><td>6</td><td>Select the section and question</td><td>Choose the relevant section number and question number to review the corresponding questionnaire result.</td></tr><tr><td>7</td><td>View departmental responses</td><td>Click “View Selected Departments' Responses” to display your department’s response. Select “All Departments” where comparison across EPA departments is required.</td></tr><tr><td>8</td><td>Review the integrated result</td><td>Click “Proposed integrated Result” to view the proposed consolidated EPA result for the selected question, including the aggregation method and explanatory note.</td></tr><tr><td>9</td><td>Verify or revise the result</td><td>Click “Verify Result”. If the integrated result reflects the overall EPA position, choose “Agree” and save the verification. If it does not, choose “Disagree”, select the response that better reflects the EPA position, and save the verification with any necessary comment.</td></tr></tbody></table></div><h3>Step-by-step instructions (continued)</h3><div class=\"help-table-wrap\"><table class=\"help-table\"><tbody><tr><th>Step</th><th>Action</th><th>Guidance</th></tr><tr><td>10</td><td>Review saved submissions</td><td>Click “Department Verification” to review the verification entries already submitted by your department.</td></tr><tr><td>11</td><td>Continue across the questionnaire</td><td>Move to the next section or question and repeat the review, comparison and verification steps until all relevant questions have been addressed.</td></tr><tr><td>12</td><td>Export the verification record</td><td>When all relevant sections have been reviewed, click “Export Verification” and save the generated verification file. This file constitutes the department’s documented verification record.</td></tr><tr><td>13</td><td>Submit the departmental verification</td><td>Click “Send Department Verification file”. If an email window opens, attach the exported file and send it to the NEDMP project team. If the email window does not open automatically, send the exported file manually through the agreed official channel.</td></tr></tbody></table></div><h3>Verification principles</h3><div class=\"help-table-wrap\"><table class=\"help-table\"><tbody><tr><th>Principle</th><th>Application</th></tr><tr><td>Accuracy</td><td>Corrections should address factual accuracy, interpretation of departmental responses, and the validity of the proposed integrated EPA position.</td></tr><tr><td>Transparency</td><td>Where the department disagrees with the integrated result, the revised answer should be accompanied by a clear explanation.</td></tr><tr><td>Institutional accountability</td><td>The submitted verification file will form part of the NEDMP evidence base and may be used to support the consolidated EPA institutional response.</td></tr><tr><td>Completeness</td><td>All relevant sections should be reviewed before exporting and submitting the verification record.</td></tr></tbody></table></div><p>For technical support or clarification, please contact the NEDMP project team through the designated EPA focal point.</p></div>", "ar": "<div class=\"help-doc help-doc-ar\"><h2 class=\"help-title\">التحقق من نتائج استبيان تقييم القدرات الوطنية لإدارة وحوكمة البيانات البيئية للهيئة العامة للبيئة</h2><div class=\"help-subtitle\">أداة التحقق من استجابات إدارات الهيئة العامة للبيئة</div><div class=\"help-subtitle\">دليل المستخدم لمراجعة نتائج استبيان الخطة الوطنية لإدارة البيانات البيئية المتكاملة</div><div class=\"help-callout\">الغرض من هذا الدليل<br>يدعم هذا الدليل إدارات الهيئة العامة للبيئة في مراجعة النتائج المتكاملة لاستبيان الإدارات والتحقق منها، وذلك في إطار إعداد الخطة الوطنية لإدارة البيانات البيئية )NEDMP). ويشرح الدليل كيفية استخدام أداة التحقق، واستعراض الاستجابات التي وردت من الإدارات المختلفة بالهيئة والاستجابات المقارنة بين الإدارات، وتأكيد النتيجة المتكاملة أو اقتراح تصحيحها، ثم تقديم سجل تحقق موثق إلى فريق مشروع الخطة الوطنية لإدارة البيانات  البيئية.</div><h3>قبل البدء</h3><ul class=\"help-list\"><li>تأكد من استلام كلمة مرور الإدارة ورابط أداة التحقق من فريق مشروع الخطة الوطنية لإدارة البيانات البيئية</li><li>تأكد من أنك المراجع/المحقق الإداري المكلّف، أو أنك مخوّل بتقديم الملاحظات نيابة عن إدارتك</li><li>راجع التحليل المتكامل بعناية. فالهدف هو تأكيد النتائج المجمعة للهيئة أو تصحيحها أو إبداء تحفظات عليها، وليس إعادة تنفيذ الاستبيان الكامل</li><li>في حال عدم توافق الإدارة مع إحدى النتائج المتكاملة، يرجى تقديم الموقف الإداري الأكثر دقة، مع إرفاق مبرر موجز كلما أمكن</li></ul><h3>إرشادات الاستخدام</h3><div class=\"help-table-wrap\"><table class=\"help-table\"><tbody><tr><th>الخطوة</th><th>الإجراء</th><th>الإرشادات</th></tr><tr><td>1</td><td>الوصول إلى أداة التحقق</td><td>أدخل كلمة مرور الإدارة للوصول إلى واجهة التحقق الخاصة بالهيئة العامة للبيئة/الخطة الوطنية لإدارة البيانات البيئية.</td></tr><tr><td>2</td><td>اختيار الإدارة</td><td>عند الدخول إلى النظام باستخدام كلمة مرور الإدارة، سيتم اختيار إدارتك تلقائياً في القائمة المنسدلة )اختيار الإدارة(.</td></tr><tr><td>3</td><td>إدخال اسم القائم بالتحقق</td><td>في حقل) اسم القائم بالتحقق )، أدخل اسم الموظف المسؤول عن مراجعة الموقف الإداري وتأكيده.</td></tr><tr><td>4</td><td>اختيار نطاق المراجعة</td><td>استخدم قائمة )الإدارات المشمولة في التقرير( لعرض استجابة إدارتك فقط، أو جميع استجابات الإدارات للسؤال المحدد عند الحاجة إلى المقارنة بين الإدارات.</td></tr><tr><td>5</td><td>التصفية حسب مستوى الاتفاق</td><td>استخدم خانات )التصفية حسب مستوى الاتفاق( لتصفية قائمة الأسئلة حسب مستوى واحد أو أكثر من مستويات الاتفاق وعرض الرسم البياني لتوزيع مستويات الاتفاق.</td></tr><tr><td>6</td><td>اختيار القسم والسؤال</td><td>اختر رقم القسم ورقم السؤال المطلوبين لاستعراض نتيجة الاستبيان المقابلة لهما.</td></tr><tr><td>7</td><td>استعراض الاستجابات الإدارية</td><td>اضغط على )عرض استجابات الإدارات المحددة( لإظهار استجابة إدارتك. ويمكن اختيار )جميع الإدارات( عندما تكون المقارنة عبر إدارات الهيئة مطلوبة.</td></tr><tr><td>8</td><td>مراجعة النتيجة المتكاملة</td><td>اضغط على )النتيجة المتكاملة المقترحة( للاطلاع على النتيجة الموحدة المقترحة للهيئة بشأن السؤال المحدد، بما في ذلك منهجية التجميع والملاحظة التفسيرية.</td></tr><tr><td>9</td><td>التحقق من النتيجة أو تعديلها</td><td>اضغط على )التحقق من النتيجة(. إذا كانت النتيجة المتكاملة تعكس الموقف العام للهيئة، اختر )موافق( واحفظ عملية التحقق. وإذا لم تكن تعكس ذلك، اختر )غير موافق(، ثم حدّد الاستجابة التي تعكس بشكل أدق موقف الهيئة، واحفظ التحقق مع إضافة أي تعليق ضروري.</td></tr><tr><td>10</td><td>مراجعة المدخلات المحفوظة</td><td>اضغط على (تقرير التحقق) لمراجعة مدخلات التحقق التي سبق أن قدمتها إدارتك.</td></tr><tr><td>11</td><td>الانتقال عبر الاستبيان</td><td>انتقل إلى القسم أو السؤال التالي وكرر خطوات المراجعة والمقارنة والتحقق إلى أن تتم معالجة جميع الأسئلة ذات الصلة.</td></tr><tr><td>12</td><td>تصدير سجل التحقق</td><td>بعد الانتهاء من مراجعة جميع الأقسام ذات الصلة، اضغط على (تصدير الملف)  واحفظ ملف التحقق الناتج. <br>ويُعد هذا الملف السجل الموثق للتحقق الخاص بالإدارة.</td></tr><tr><td>13</td><td>تقديم التحقق الإداري</td><td>اضغط على (إرسال ملف تحقق الإدارة) وسوف يفتح نافذة البريد الإلكتروني تلقائياً،<br> أرفق الملف المُصدّر والذي سبق حفظه وأرسله إلى فريق مشروع الخطة الوطنية لإدارة البيانات البيئية. <br>إذا لم تفتح نافذة البريد تلقائياً، أرسل الملف يدوياً عبر القناة الرسمية المتفق عليها.</td></tr></tbody></table></div><h3>مبادئ التحقق</h3><div class=\"help-table-wrap\"><table class=\"help-table\"><tbody><tr><th>المبدأ</th><th>التطبيق</th></tr><tr><td>الدقة</td><td>ينبغي أن تعالج التصحيحات دقة الوقائع، وتفسير الاستجابات الإدارية، ومدى صلاحية الموقف المتكامل المقترح للهيئة العامة للبيئة.</td></tr><tr><td>الشفافية</td><td>عند عدم توافق الإدارة مع النتيجة المتكاملة، ينبغي أن تكون الاستجابة المعدلة مصحوبة بتفسير واضح وموجز.</td></tr><tr><td>المساءلة المؤسسية</td><td>سيُعد ملف التحقق المقدم جزءاً من قاعدة الأدلة الخاصة بالخطة الوطنية لإدارة البيانات البيئية، وقد يُستخدم لدعم الاستجابة المؤسسية الموحدة للهيئة العامة للبيئة.</td></tr><tr><td>الاكتمال</td><td>ينبغي مراجعة جميع أقسام الاستبيان ذات الصلة قبل تصدير سجل التحقق وتقديمه.</td></tr></tbody></table></div><p>شكرا لدعمكم الدائم ولطلب أي إيضاح، يرجى التواصل مع فريق مشروع الخطة الوطنية لإدارة البيانات البيئية من خلال نقطة الاتصال المعتمدة لدى الهيئة العامة للبيئة.</p></div>"};
    const ACCESS_PASSWORDS = [{"department": "Chemical Safety Dep", "password": "ChemicalSafety2026", "departmentId": "D01", "canonicalId": "CD01", "role": "department"}, {"department": "Industrial and Commercial Waste Section", "password": "IndustrialWaste2026", "departmentId": "D02", "canonicalId": "CD02", "role": "department"}, {"department": "Municipal Waste Section", "password": "MunicipalWaste2026", "departmentId": "D03", "canonicalId": "CD03", "role": "department"}, {"department": "Medical Waste Section", "password": "MedicalWaste2026", "departmentId": "D04", "canonicalId": "CD04", "role": "department"}, {"department": "Air Quality Monitoring Department", "password": "AirQuality2026", "departmentId": "D05", "canonicalId": "CD05", "role": "department"}, {"department": "Waste Management Department", "password": "WasteManagement2026", "departmentId": "D06", "canonicalId": "CD06", "role": "department"}, {"department": "Water Quality Monitoring Department – Sea Water Monitoring Section", "password": "SeaWaterQuality2026", "departmentId": "D07", "canonicalId": "CD07", "role": "department"}, {"department": "Center of Analytical Laboratories", "password": "AnalyticalLabs2026", "departmentId": "D08", "canonicalId": "CD08", "role": "department"}, {"department": "Environmental Monitoring Information System (eMISK) – Database Section", "password": "eMISKDatabase2026", "departmentId": "D10", "canonicalId": "CD09", "role": "department"}, {"department": "Admin", "password": "admin2026", "departmentId": "", "canonicalId": "", "role": "admin"}];

    const AGREEMENT_LEVELS = [

    function visibleSections() {

    function stripLeadingToken(text, token) {
      let value = String(text || '').trim();
      const cleanToken = String(token || '').trim();
      if (!cleanToken) return value;
      const escaped = cleanToken.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

    function agreementLevelMeta(value) {

    function integratedFieldLabel(key) {

    function agreementLevelFilterLabel(item) {

    function agreementFilterState() {

    function agreementFilterAllows(question) {

    function populateAgreementLevelFilter(state = null) {

    function renderPieSegmentLabels(items, total) {
      let start = 0;
      return items.map(item => {
        const span = total ? (item.count / total) * 360 : 0;
        const percent = item.percent ?? Math.round((item.count / total) * 100);
        const mid = start + span / 2;
        start += span;
        if (!item.count || !percent) return '';
        const radians = (mid - 90) * Math.PI / 180;
        const radius = percent < 8 ? 39 : 34;
        const left = 50 + Math.cos(radians) * radius;
        const top = 50 + Math.sin(radians) * radius;
        const small = percent < 8 ? ' pie-label-small' : '';
        return `<span class="pie-label${small}" style="left:${left.toFixed(1)}%; top:${top.toFixed(1)}%">${percent}%</span>`;
      }).join('');
    }

    function setQueuedOnlineRecords(records) {

    function ensureSubmissionId(record) {
      if (!record.submissionId) {
        record.submissionId = `EPA-NEDMP-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
      }

    function backendPayload(records, action = 'submitVerification') {
      return {
        action,
        appVersion: 'v21',
        sourceUrl: window.location.href,
        language: lang,
        records: Array.isArray(records) ? records : [records],
      };
    }
    async function postToGoogleSheet(records, action = 'submitVerification') {
      const backendUrl = configuredBackendUrl();
      if (!backendUrl) return {ok: false, skipped: true};
      const batch = (Array.isArray(records) ? records : [records]).filter(Boolean);
      batch.forEach(ensureSubmissionId);
      await fetch(backendUrl, {
        method: 'POST',
        mode: 'no-cors',

        body: JSON.stringify(backendPayload(batch, action)),

      return {ok: true, opaque: true};
    }
    async function submitRecordOnline(record, showResult = true) {

      try {
        const result = await postToGoogleSheet(record, 'submitVerification');

          const queue = getQueuedOnlineRecords();
          if (!queue.some(item => item.submissionId === record.submissionId)) {
            queue.push(record);
            setQueuedOnlineRecords(queue);
          }
          if (showResult) showToast(currentT().savedOffline);
          return false;

        if (showResult) showToast(currentT().savedOnline);

        const queue = getQueuedOnlineRecords();

        if (showResult) showToast(currentT().savedOffline);

    function filteredQuestions() {

    function selectedQuestion() {

    function completionMetrics() {

    function normalizeResponseKey(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/[‐‑–—]/g, '-')
        .replace(/&/g, 'and')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function splitResponseCategories(value) {
      const text = String(value || '').trim();
      if (!text) return [currentT().noResponse];
      const parts = text.split(/\s*(?:;|\n|،|,)\s*/).map(part => part.trim()).filter(Boolean);
      return parts.length > 1 ? parts : [text];
    }

    function optionMatchForQuestion(q, value, valueAr = '') {
      const key = normalizeResponseKey(value);
      if (!key) return null;
      const options = q?.options || [];
      const optionsAr = q?.optionsAr || [];
      for (let index = 0; index < options.length; index += 1) {
        const option = options[index];
        const optionAr = optionsAr[index] || TERM_AR[String(option || '')] || '';
        const optionArKey = normalizeResponseKey(optionAr);
        const valueArKey = normalizeResponseKey(valueAr);
        if (
          normalizeResponseKey(option) === key ||
          (optionArKey && optionArKey === key) ||
          (valueArKey && optionArKey && valueArKey === optionArKey)
        ) {
          return {value: option, valueAr: optionAr || valueAr || TERM_AR[String(option || '')] || ''};
        }
      }
      return null;
    }

    function responseCategoriesForQuestion(q, selection, selectionAr = '') {
      const text = String(selection || '').trim();
      const textAr = String(selectionAr || '').trim();
      if (!text && !textAr) return [{value: currentT().noResponse, valueAr: currentT().noResponse}];

      const categories = [];
      const seen = new Set();
      const addCategory = (value, valueAr = '') => {
        const key = normalizeResponseKey(value || valueAr);
        if (!key || seen.has(key)) return;
        seen.add(key);
        categories.push({value: value || valueAr, valueAr: valueAr || TERM_AR[String(value || '')] || ''});
      };

      const parts = splitResponseCategories(text);
      const partsAr = splitResponseCategories(textAr);
      parts.forEach((part, index) => {
        const match = optionMatchForQuestion(q, part, partsAr[index] || '');
        if (match) addCategory(match.value, match.valueAr);
      });

      if (!categories.length) {
        const fullMatch = optionMatchForQuestion(q, text, textAr);
        if (fullMatch) addCategory(fullMatch.value, fullMatch.valueAr);
      }

      if (!categories.length && q?.options?.length) {
        const normalizedText = normalizeResponseKey(text);
        const normalizedAr = normalizeResponseKey(textAr);
        q.options.forEach((option, index) => {
          const optionAr = q.optionsAr?.[index] || TERM_AR[String(option || '')] || '';
          const optionKey = normalizeResponseKey(option);
          const optionArKey = normalizeResponseKey(optionAr);
          if (
            (optionKey.length > 8 && normalizedText.includes(optionKey)) ||
            (optionArKey.length > 8 && normalizedAr.includes(optionArKey))
          ) {
            addCategory(option, optionAr);
          }
        });
      }

      if (!categories.length) {
        addCategory(text || textAr || currentT().noResponse, textAr || TERM_AR[String(text || '')] || '');
      }
      return categories;
    }

    function localizedResponseText(q, selection, selectionAr = '') {
      const categories = responseCategoriesForQuestion(q, selection, selectionAr);
      const separator = lang === 'ar' ? '؛ ' : '; ';
      return categories.map(item => dataText(item.value, item.valueAr)).join(separator);
    }

    function responseDistribution(rows, q) {
      const map = new Map();
      rows.forEach(row => {
        responseCategoriesForQuestion(q, row.selection, row.selectionAr).forEach(category => {
          const key = normalizeResponseKey(category.value || category.valueAr || currentT().noResponse);
          if (!map.has(key)) map.set(key, {value: category.value || currentT().noResponse, valueAr: category.valueAr || '', count: 0});
          map.get(key).count += 1;
        });
      });
      return [...map.values()].sort((a, b) => b.count - a.count || a.value.localeCompare(b.value));
    }

    function renderDistributionChart(rows, q) {
      const categories = responseDistribution(rows, q);
      const total = categories.reduce((sum, item) => sum + item.count, 0);
      if (!total) return `<div class="chart-card"><h2>${esc(currentT().responseDistribution)}</h2><div class="note">${esc(currentT().noChartData)}</div></div>`;
      const items = categories.map((item, index) => ({
        ...item,
        color: chartColors[index % chartColors.length],
        percent: Math.round((item.count / total) * 100),
      }));
      if (items.length < 8) {
        let start = 0;
        const stops = items.map(item => {
          const end = start + (item.count / total) * 360;
          const stop = `${item.color} ${start.toFixed(2)}deg ${end.toFixed(2)}deg`;
          start = end;
          return stop;
        }).join(', ');
        const labels = renderPieSegmentLabels(items, total);
        const legend = items.map(item => `
          <div class="legend-item">
            <span class="legend-swatch" style="background:${item.color}"></span>
            <span>${esc(dataText(item.value, item.valueAr))}</span>
            <strong>${item.count} (${item.percent}%)</strong>
          </div>`).join('');
        return `<div class="chart-card">
          <h2>${esc(currentT().responseDistribution)}</h2>
          <div class="chart-layout">
            <div class="pie-wrap"><div class="response-pie" style="background: conic-gradient(${stops})"></div>${labels}</div>
            <div class="legend">${legend}</div>
          </div>
        </div>`;
      }
      const bars = items.map(item => `
        <div class="bar-row">
          <div>${esc(dataText(item.value, item.valueAr))}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${item.percent}%; background:${item.color}"></div></div>
          <strong>${item.count} (${item.percent}%)</strong>
        </div>`).join('');
      return `<div class="chart-card">
        <h2>${esc(currentT().responseDistribution)}</h2>
        <div class="bar-list">${bars}</div>
      </div>`;
    }

    function renderAgreementLevelPie() {

    function questionAllowsMultiple(q) {
      if (typeof q.allowMultiple === 'boolean') return q.allowMultiple;
      const method = String(q.integrated?.['Aggregation Method'] || '');
      const response = String(q.integrated?.['EPA Integrated Response'] || '');
      const question = String(q.question || '');
      if (/multiple-selection/i.test(method)) return true;
      if (/,/.test(response) && /\b(type|source|need|barrier|challenge|area|mechanism|report|support|role)\b/i.test(question)) return true;
      return false;
    }

    function renderPreferredOptions(q) {
      const options = q.options || [];

      el('preferredOptions').innerHTML = options.map((option, index) => `
        <label class="choice-option">

          });

    function commitVerification(record) {
      ensureSubmissionId(record);
      recordCache = getLocalRecords().concat([record]);
      setLocalRecords(recordCache);
      renderStats();
      updateQuestions();

      el('explanationPromptModal').style.display = 'none';
      el('explanationTextModal').style.display = 'none';
      pendingVerificationRecord = null;
      showToast(currentT().saved);
      submitRecordOnline(record);

    async function saveVerification() {
      const q = selectedQuestion();
      if (!q) {
        showToast(currentT().noAgreementLevelQuestions);
        return;
      }
      const dept = selectedVerifierDepartment();
      const canonical = canonicalDepartmentById(dept?.canonicalId);
      const decision = document.querySelector('input[name="decision"]:checked').value;
      const integratedResponse = q.integrated?.['EPA Integrated Response'] || '';
      const integratedResponseAr = q.integratedAr?.['EPA Integrated Response'] || '';
      const preferredItems = decision === 'Disagree'
        ? selectedPreferredOptions(q)
        : [{value: integratedResponse, valueAr: integratedResponseAr}];
      if (decision === 'Disagree' && !preferredItems.length) {
        showToast(currentT().chooseOnePreferred);
        return;
      }
      const preferred = preferredItems.map(item => item.value).join('; ');
      const preferredAr = preferredItems.map(item => item.valueAr).filter(Boolean).join('; ');
      const reviewedIds = selectedDepartmentIds();
      const reviewedDepartments = reviewedIds.map(id => departmentById(id)).filter(Boolean);
      const record = {
        timestamp: new Date().toISOString(),
        verifierDepartment: dept?.name || '',
        verifierDepartmentAr: dept?.nameAr || '',
        verifierDepartmentCanonicalId: dept?.canonicalId || '',
        verifierDepartmentCanonicalName: canonical?.name || dept?.name || '',
        verifierDepartmentCanonicalNameAr: canonical?.nameAr || dept?.nameAr || '',
        verifierName: el('verifierName').value,
        reviewedDepartmentIds: reviewedIds.join('; '),
        reviewedDepartments: reviewedDepartments.map(d => d.name).join('; '),
        reviewedDepartmentsAr: reviewedDepartments.map(d => d.nameAr).join('; '),
        sectionId: q.sectionId,
        sectionName: q.sectionName,
        sectionNameAr: q.sectionNameAr,
        questionId: q.id,
        questionNo: q.questionNo,
        question: q.question,
        questionAr: q.questionAr,
        decision,
        originalIntegratedResponse: integratedResponse,
        originalIntegratedResponseAr: integratedResponseAr,
        preferredIntegratedResult: preferred,
        preferredIntegratedResultAr: preferredAr,
        agreementLevel: q.integrated?.['Agreement Level'] || '',
        agreementLevelAr: q.integratedAr?.['Agreement Level'] || '',
        aggregationMethod: q.integrated?.['Aggregation Method'] || '',
        aggregationMethodAr: q.integratedAr?.['Aggregation Method'] || '',
        explanation: '',
      };
      if (decision === 'Disagree') {
        pendingVerificationRecord = record;
        document.querySelector('input[name="explanationChoice"][value="yes"]').checked = true;
        el('verifyModal').style.display = 'none';
        el('explanationPromptModal').style.display = 'flex';
        return;
      }
      commitVerification(record);
    }

    function submitExplanationChoice() {
      if (!pendingVerificationRecord) return;
      const choice = document.querySelector('input[name="explanationChoice"]:checked').value;
      if (choice === 'yes') {
        el('explanationPromptModal').style.display = 'none';
        el('explanationText').value = '';
        el('explanationTextModal').style.display = 'flex';
      } else {
        pendingVerificationRecord.explanation = '';
        commitVerification(pendingVerificationRecord);
      }
    }
    function submitExplanationText() {
      if (!pendingVerificationRecord) return;
      pendingVerificationRecord.explanation = el('explanationText').value.trim();
      commitVerification(pendingVerificationRecord);
    }
    function cancelExplanationFlow() {
      pendingVerificationRecord = null;
      el('explanationPromptModal').style.display = 'none';
      el('explanationTextModal').style.display = 'none';
    }

      el('cancelExplanationPrompt').addEventListener('click', cancelExplanationFlow);
      el('submitExplanationChoice').addEventListener('click', submitExplanationChoice);
      el('cancelExplanationText').addEventListener('click', cancelExplanationFlow);
      el('submitExplanationText').addEventListener('click', submitExplanationText);
      document.querySelectorAll('input[name="decision"]').forEach(r => {
        r.addEventListener('change', () => {
          el('preferredBlock').style.display = document.querySelector('input[name="decision"]:checked').value === 'Disagree' ? 'block' : 'none';
        });
      });
      el('verifyModal').addEventListener('click', (event) => {
        if (event.target === el('verifyModal')) el('verifyModal').style.display = 'none';
      });
      el('explanationPromptModal').addEventListener('click', (event) => {
        if (event.target === el('explanationPromptModal')) cancelExplanationFlow();
      });
      el('explanationTextModal').addEventListener('click', (event) => {
        if (event.target === el('explanationTextModal')) cancelExplanationFlow();
      });
      el('helpModal').addEventListener('click', (event) => {
        if (event.target === el('helpModal')) closeHelp();
      });
    }

    function init() {
      captureBackendUrlFromQuery();
      recordCache = getLocalRecords();
      populateDepartments();
      populateDepartmentFilter();
      populateSections();
      populateAgreementLevelFilter();
      updateQuestions();
      bindEvents();
      applyLanguage();
      restoreSessionAccess();
      syncQueuedOnlineRecords();
    }
    init();
  </script>
</body>
</html>
